name: Build & Push SAM3 Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create/Update RunPod endpoint
        if: success()
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          IMAGE: ghcr.io/${{ github.repository }}:latest
        run: |
          echo "Image built: $IMAGE"
          # Create or update RunPod template
          TEMPLATE_RESULT=$(curl -s -X POST \
            "https://api.runpod.io/graphql?api_key=$RUNPOD_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { saveTemplate(input: { containerDiskInGb: 30, imageName: \\\"$IMAGE\\\", isPublic: false, isServerless: true, name: \\\"sam3-floor-plan\\\", env: [{key: \\\"SAM3_MODEL_ID\\\", value: \\\"facebook/sam3\\\"}] }) { id name } }\"}"
          )
          echo "Template result: $TEMPLATE_RESULT"
          TEMPLATE_ID=$(echo $TEMPLATE_RESULT | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Template ID: $TEMPLATE_ID"
          echo "TEMPLATE_ID=$TEMPLATE_ID" >> $GITHUB_ENV

      - name: Output image URL
        run: |
          echo "✅ Docker image: ghcr.io/${{ github.repository }}:latest"
          echo "Add RUNPOD_API_KEY to repo secrets to auto-create RunPod endpoint"
